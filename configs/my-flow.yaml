port: 9090
trace_file: /home/fluxart/agent-mesh/traces.jsonl

mcp_servers:
  - name: filesystem
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/fluxart"]

  - name: gmail
    transport: stdio
    command: npx
    args: ["-y", "@monsoft/mcp-gmail"]

  # Uncomment when GITHUB_TOKEN is set:
  # - name: github
  #   transport: stdio
  #   command: npx
  #   args: ["-y", "@modelcontextprotocol/server-github"]
  #   env:
  #     GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"

policies:
  - name: claude
    agent: "claude"
    rules:
      # Filesystem — read only
      - tools:
          [
            "filesystem.directory_tree",
            "filesystem.get_file_info",
            "filesystem.list_allowed_directories",
            "filesystem.list_directory",
            "filesystem.list_directory_with_sizes",
            "filesystem.read_file",
            "filesystem.read_media_file",
            "filesystem.read_multiple_files",
            "filesystem.read_text_file",
            "filesystem.search_files",
          ]
        action: allow
      - tools:
          [
            "filesystem.create_directory",
            "filesystem.edit_file",
            "filesystem.move_file",
            "filesystem.write_file",
          ]
        action: deny

      # Gmail — read only
      - tools:
          [
            "gmail.gmail_read_email",
            "gmail.gmail_list_emails",
            "gmail.gmail_list_emails_with_advanced_filters",
            "gmail.gmail_list_email_labels",
            "gmail.gmail_get_forwarding",
            "gmail.gmail_get_vacation_responder",
          ]
        action: allow
      # Gmail — all write/modify/delete operations blocked
      - tools:
          [
            "gmail.gmail_send_email",
            "gmail.gmail_draft_email",
            "gmail.gmail_delete_email",
            "gmail.gmail_delete_label",
            "gmail.gmail_create_label",
            "gmail.gmail_update_label",
            "gmail.gmail_archive_email",
            "gmail.gmail_move_to_trash",
            "gmail.gmail_recover_from_trash",
            "gmail.gmail_mark_as_read",
            "gmail.gmail_mark_as_unread",
            "gmail.gmail_modify_email",
            "gmail.gmail_set_vacation_responder",
            "gmail.gmail_update_forwarding",
            "gmail.gmail_batch_archive",
            "gmail.gmail_batch_delete",
            "gmail.gmail_batch_mark_as_read",
            "gmail.gmail_batch_mark_as_unread",
            "gmail.gmail_batch_modify",
            "gmail.gmail_batch_move_to_trash",
          ]
        action: deny

  - name: default
    agent: "*"
    rules:
      - tools: ["*"]
        action: deny
